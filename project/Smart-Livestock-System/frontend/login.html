<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Livestock Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .auth-header p {
            color: #666;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
        }

        .auth-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .tab-buttons {
            display: flex;
            margin-bottom: 30px;
            border-radius: 8px;
            overflow: hidden;
            background: #f8f9fa;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f8f9fa;
            color: #666;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #c33;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #363;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #363;
            display: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🐄 SmartLivestock</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#about">About</a></li>
            </ul>
        </div>
    </nav>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your Smart Livestock account</p>
            </div>

            <!-- Tab Buttons -->
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Register</button>
            </div>

            <!-- Error/Success Messages -->
            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>

            <!-- Login Form -->
            <form id="login-form" class="tab-content active">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="auth-btn" id="login-btn">
                    <span id="login-text">Sign In</span>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="tab-content">
                <div class="form-group">
                    <label for="reg-username">Username *</label>
                    <input type="text" id="reg-username" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email *</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label for="reg-fullname">Full Name *</label>
                    <input type="text" id="reg-fullname" required>
                </div>
                <div class="form-group">
                    <label for="reg-phone">Phone</label>
                    <input type="tel" id="reg-phone">
                </div>
                <div class="form-group">
                    <label for="reg-address">Address</label>
                    <input type="text" id="reg-address">
                </div>
                <div class="form-group">
                    <label for="reg-farmname">Farm Name</label>
                    <input type="text" id="reg-farmname">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password *</label>
                    <input type="password" id="reg-password" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="reg-confirm-password">Confirm Password *</label>
                    <input type="password" id="reg-confirm-password" required minlength="8">
                </div>
                <button type="submit" class="auth-btn" id="register-btn">
                    <span id="register-text">Create Account</span>
                </button>
            </form>

            <div class="auth-links">
                <p>Demo accounts: farmer_john, farmer_sarah, farmer_mike (password: password123)</p>
            </div>
        </div>
    </div>

    <script>
        // Tab switching functionality
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + '-form').classList.add('active');
            event.target.classList.add('active');
        }

        // Login form submission
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const loginBtn = document.getElementById('login-btn');
            const loginText = document.getElementById('login-text');

            // Show loading state
            loginBtn.disabled = true;
            loginText.innerHTML = '<div class="loading"></div>Signing In...';

            try {
                const response = await fetch('../backend/api/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // Show success message
                    showMessage('success', 'Login successful! Redirecting...');

                    // Redirect to dashboard after short delay
                    setTimeout(() => {
                        window.location.href = 'dashboard.php';
                    }, 1000);
                } else {
                    showMessage('error', result.message || 'Login failed');
                }
            } catch (error) {
                showMessage('error', 'Network error. Please try again.');
            } finally {
                // Reset button state
                loginBtn.disabled = false;
                loginText.textContent = 'Sign In';
            }
        });

        // Register form submission
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;

            if (password !== confirmPassword) {
                showMessage('error', 'Passwords do not match');
                return;
            }

            const registerBtn = document.getElementById('register-btn');
            const registerText = document.getElementById('register-text');

            // Show loading state
            registerBtn.disabled = true;
            registerText.innerHTML = '<div class="loading"></div>Creating Account...';

            const formData = {
                username: document.getElementById('reg-username').value,
                email: document.getElementById('reg-email').value,
                full_name: document.getElementById('reg-fullname').value,
                phone: document.getElementById('reg-phone').value,
                address: document.getElementById('reg-address').value,
                farm_name: document.getElementById('reg-farmname').value,
                password: password,
                confirm_password: confirmPassword
            };

            try {
                const response = await fetch('../backend/api/register.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('success', 'Registration successful! You can now login.');

                    // Switch to login tab after short delay
                    setTimeout(() => {
                        showTab('login');
                        document.getElementById('login-username').value = formData.username;
                    }, 1500);
                } else {
                    showMessage('error', result.message || 'Registration failed');
                }
            } catch (error) {
                showMessage('error', 'Network error. Please try again.');
            } finally {
                // Reset button state
                registerBtn.disabled = false;
                registerText.textContent = 'Create Account';
            }
        });

        // Message display function
        function showMessage(type, message) {
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');

            // Hide both messages first
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Show appropriate message
            if (type === 'error') {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            } else {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
            }

            // Auto-hide success messages after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    successDiv.style.display = 'none';
                }, 5000);
            }
        }

        // Pre-fill demo credentials for easy testing
        document.addEventListener('DOMContentLoaded', function() {
            // Add demo login buttons
            const demoSection = document.querySelector('.auth-links');
            demoSection.innerHTML = `
                <p><strong>Demo Accounts:</strong></p>
                <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
                    <button type="button" onclick="loginDemo('farmer_john')" style="padding: 5px 10px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer;">John</button>
                    <button type="button" onclick="loginDemo('farmer_sarah')" style="padding: 5px 10px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer;">Sarah</button>
                    <button type="button" onclick="loginDemo('farmer_mike')" style="padding: 5px 10px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer;">Mike</button>
                </div>
                <p style="margin-top: 10px; font-size: 14px;">Password: password123</p>
            `;
        });

        function loginDemo(username) {
            document.getElementById('login-username').value = username;
            document.getElementById('login-password').value = 'password123';
            document.getElementById('login-form').dispatchEvent(new Event('submit'));
        }
    </script>
</body>
</html>
